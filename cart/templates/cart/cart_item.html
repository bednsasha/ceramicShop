<div class="cart-item pb-6 border-b border-pottery/20" id="cart-item-{{ item.id }}">
    <div class="flex flex-col items-center">
        <!-- Product Image -->
        <div class="w-32 h-32 mb-4 rounded-lg overflow-hidden bg-cream soft-border flex items-center justify-center">
            {% if item.product.main_image %}
                <img src="{{ item.product.main_image.url }}" 
                     alt="{{ item.product.name }}" 
                     class="w-full h-full object-cover transition-transform hover:scale-105 duration-500">
            {% else %}
                <div class="w-full h-full flex items-center justify-center">
                    <svg class="w-10 h-10 text-pottery/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
            {% endif %}
        </div>
        
        <!-- Product Info -->
        <div class="text-center">
            <h3 class="font-serif text-base text-potteryDark mb-1">{{ item.product.name }}</h3>
            {% if item.product.color %}
                <p class="text-xs text-stone/70 mb-1">{{ item.product.color|capfirst }}</p>
            {% endif %}
            <p class="text-xs text-stone mb-2">
                {{ item.product_size.size.get_attribute_type_display }}: {{ item.product_size.value }}
            </p>
            <p class="font-medium text-potteryDark">{{ item.product.price }} ₽</p>
            
            <!-- Quantity Controls -->
            <div class="flex items-center justify-center mt-3 space-x-2">
                <button class="w-7 h-7 flex items-center justify-center border border-pottery/30 rounded-lg text-stone hover:border-terracotta hover:text-terracotta transition-colors duration-200"
                        hx-post="{% url 'cart:update_cart_item' item.id %}"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                        hx-vals='{"quantity": "{{ item.quantity|add:-1 }}"}'
                        hx-target="#cart-modal"
                        hx-swap="outerHTML"
                        {% if item.quantity <= 1 %}disabled class="opacity-40 cursor-not-allowed"{% endif %}>
                    −
                </button>
                <span class="mx-2 w-8 text-center text-stone">{{ item.quantity }}</span>
                <button class="w-7 h-7 flex items-center justify-center border border-pottery/30 rounded-lg text-stone hover:border-terracotta hover:text-terracotta transition-colors duration-200"
                        hx-post="{% url 'cart:update_cart_item' item.id %}"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                        hx-vals='{"quantity": "{{ item.quantity|add:1 }}"}'
                        hx-target="#cart-modal"
                        hx-swap="outerHTML">
                    +
                </button>
            </div>
            
            <!-- Remove button -->
            <button class="mt-2 text-xs text-stone/60 hover:text-terracotta transition-colors duration-200 underline"
                    hx-post="{% url 'cart:remove_cart_item' item.id %}"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-target="#cart-modal"
                    hx-swap="outerHTML">
                Удалить
            </button>
        </div>
    </div>
</div>
