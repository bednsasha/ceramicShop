<div id="cart-modal" class="fixed right-0 top-0 h-screen w-full max-w-md bg-white shadow-2xl z-50 transition-transform duration-300">
    <div class="h-full flex flex-col">
        <!-- Cart Header -->
        <div class="flex justify-between items-center p-6 border-b border-gray-200">
            <h1 class="text-2xl font-bold">КОРЗИНА (<span id="cart-count">{{ cart.total_items }}</span>)</h1>
            <button onclick="closeCart()" class="text-2xl hover:text-gray-600">×</button>
        </div>

        <!-- Cart Items -->
        <div class="flex-1 overflow-y-auto p-6">
            <div id="cart-items" class="space-y-8">
                {% for item in cart_items %}
                    {% include 'cart/cart_item.html' %}
                {% empty %}
                    <div class="text-center py-20 text-gray-500">
                        <p class="text-lg mb-4">Ваша корзина пуста</p>
                        <button onclick="closeCart()" class="text-sm underline">Продолжить покупки</button>
                    </div>
                {% endfor %}
            </div>
        </div>

        <!-- Cart Footer -->
        <div id="cart-summary" class="border-t border-gray-200 p-6">
            {% if cart_items %}
                {% include 'cart/cart_summary.html' %}
            {% else %}
                <div class="text-center text-gray-500">
                    <p>Ваша корзина пуста</p>
                </div>
            {% endif %}
        </div>
    </div>
</div>

<!-- Cart Overlay -->
<div id="cart-overlay" class="fixed inset-0 bg-black/50 z-40"></div>

<style>
    #cart-modal {
        transform: translateX(100%);
        transition: transform 0.3s ease-in-out;
    }
    #cart-modal.open {
        transform: translateX(0);
    }
    #cart-modal.closed {
        transform: translateX(100%);
    }
    
    #cart-overlay {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
    }
    #cart-overlay.open {
        opacity: 1;
        visibility: visible;
    }
</style>

<script>
    let isCartAnimating = false;
    
    function openCart() {
        if (isCartAnimating) return;
        
        const modal = document.getElementById('cart-modal');
        const overlay = document.getElementById('cart-overlay');
        
        if (modal && overlay) {
            isCartAnimating = true;
            modal.classList.remove('closed');
            modal.classList.add('open');
            overlay.classList.remove('closed');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
            
            setTimeout(() => {
                isCartAnimating = false;
            }, 300);
            console.log('Cart modal opened');
        }
    }

    function closeCart() {
        if (isCartAnimating) return;
        
        const modal = document.getElementById('cart-modal');
        const overlay = document.getElementById('cart-overlay');
        
        if (modal && overlay) {
            isCartAnimating = true;
            modal.classList.remove('open');
            modal.classList.add('closed');
            overlay.classList.remove('open');
            overlay.classList.add('closed');
            document.body.style.overflow = '';
            
            setTimeout(() => {
                isCartAnimating = false;
                const container = document.getElementById('cart-container');
                if (container && !modal.classList.contains('open')) {
                    container.innerHTML = '';
                }
            }, 300);
            console.log('Cart modal closed');
        }
    }

    // Используем один обработчик с флагом
    let cartModalLoaded = false;
    
    document.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'cart-container' && !cartModalLoaded) {
            cartModalLoaded = true;
            console.log('Cart content loaded, opening modal');
            setTimeout(() => {
                openCart();
                // Сбрасываем флаг через секунду
                setTimeout(() => {
                    cartModalLoaded = false;
                }, 500);
            }, 50);
        }
    });
</script>
