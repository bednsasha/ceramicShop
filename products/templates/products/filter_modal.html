<div class="p-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold tracking-tight text-gray-900 uppercase">Фильтры</h2>
        <button class="text-gray-600 hover:text-gray-900"
                onclick="document.getElementById('filter-modal').classList.add('hidden')">
            ×
        </button>
    </div>

    <form hx-get="{% if current_category %}{% url 'products:catalog' current_category.slug %}{% else %}{% url 'products:catalog_all' %}{% endif %}" 
          hx-target="#main-content" 
          hx-push-url="true">
        <input type="hidden" name="q" value="{{ filter_params.q|default:'' }}">
        
        <div class="space-y-6">
            <!-- Color -->
            <div>
                <h3 class="text-sm font-medium text-gray-900 mb-3">Цвет</h3>
                <input type="text" 
                       name="color" 
                       value="{{ filter_params.color|default:'' }}" 
                       class="w-full border border-gray-300 py-2 px-3 text-sm uppercase focus:outline-none focus:border-gray-900">
            </div>

            <!-- Price Range -->
            <div>
                <h3 class="text-sm font-medium text-gray-900 mb-3">Цена</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" 
                           name="min_price" 
                           value="{{ filter_params.min_price|default:'' }}" 
                           placeholder="Min" 
                           class="border border-gray-300 py-2 px-3 text-sm uppercase focus:outline-none focus:border-gray-900">
                    <input type="number" 
                           name="max_price" 
                           value="{{ filter_params.max_price|default:'' }}" 
                           placeholder="Max" 
                           class="border border-gray-300 py-2 px-3 text-sm uppercase focus:outline-none focus:border-gray-900">
                </div>
            </div>

            <!-- Size -->
            <div>
                <h3 class="text-sm font-medium text-gray-900 mb-3">Размер</h3>
                <select name="size_type" class="w-full border border-gray-300 py-2 px-3 text-sm uppercase focus:outline-none focus:border-gray-900">
                    <option value="">Любой размер</option>
                    {% for size in sizes %}
                    <option value="{{ size.attribute_type }}" {% if filter_params.size_type == size.attribute_type %}selected{% endif %}>
                        {{ size.get_attribute_type_display }}
                    </option>
                    {% endfor %}
                </select>
                <div class="grid grid-cols-2 gap-4 mt-3">
                    <input type="number" 
                           name="min_size" 
                           value="{{ filter_params.min_size|default:'' }}" 
                           placeholder="от"
                           class="border border-gray-300 py-2 px-3 text-sm uppercase focus:outline-none focus:border-gray-900">
                    <input type="number" 
                           name="max_size" 
                           value="{{ filter_params.max_size|default:'' }}" 
                           placeholder="до"
                           class="border border-gray-300 py-2 px-3 text-sm uppercase focus:outline-none focus:border-gray-900">
                </div>
            </div>

            <!-- Glaze Type -->
            <div>
                <h3 class="text-sm font-medium text-gray-900 mb-3">Тип глазури</h3>
                <div class="space-y-2">
                    <label class="flex items-center">
                        <input type="radio" name="glaze_type" value="" {% if not filter_params.glaze_type %}checked{% endif %} class="mr-2">
                        <span class="text-sm uppercase">Любая</span>
                    </label>
                    {% for value, label in product.GLAZE_CHOICES %}
                    <label class="flex items-center">
                        <input type="radio" name="glaze_type" value="{{ value }}" {% if filter_params.glaze_type == value %}checked{% endif %} class="mr-2">
                        <span class="text-sm uppercase">{{ label }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- Form Actions -->
            <div class="flex justify-between">
                <button type="button" 
                        class="border border-gray-300 py-2 px-4 text-sm font-medium uppercase hover:border-gray-900 transition-colors"
                        onclick="document.getElementById('filter-modal').classList.add('hidden')">
                    Отмена
                </button>
                <button type="submit" 
                        class="bg-black text-white py-2 px-4 text-sm font-medium uppercase hover:bg-gray-800 transition-colors">
                    Применить фильтры
                </button>
            </div>
        </div>
    </form>
</div>
