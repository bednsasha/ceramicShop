<div class="relative inline-block">
    <input type="text" 
           id="search-input" 
           name="q" 
           placeholder="SEARCH" 
           value="{{ search_query|default:'' }}"
           class="w-48 sm:w-56 bg-[#FDFBF7] border border-[#E8E2D9] py-2 px-3 text-sm font-medium tracking-wide text-[#4A3B32] placeholder:text-[#B8A99A] focus:outline-none focus:border-[#C4A690] focus:ring-0 transition-colors"
           hx-get="{% url 'products:catalog_all' %}" 
           hx-target="#main-content" 
           hx-push-url="true"
           hx-trigger="input delay:500ms"
           hx-swap="innerHTML">
    <button class="absolute right-2 top-1/2 -translate-y-1/2 text-[#A28F7D] hover:text-[#4A3B32] transition-colors"
            hx-get="{% url 'products:catalog_all' %}?reset_search=true" 
            hx-target="#search-wrapper, #mobile-search-wrapper"
            hx-swap="innerHTML"
            hx-on::before-request="document.getElementById('search-input').value = ''; document.getElementById('search-input').placeholder = 'SEARCH';">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
            // Handle placeholder behavior
            const updatePlaceholder = () => {
                if (searchInput.value.trim() !== '') {
                    searchInput.placeholder = '';
                } else {
                    searchInput.placeholder = 'SEARCH';
                }
            };
            
            searchInput.addEventListener('input', updatePlaceholder);
            updatePlaceholder(); // initial check if value is pre-filled
            searchInput.focus();
            
            // Optional: keep focus after clearing via the reset button (HTMX settles)
            document.body.addEventListener('htmx:afterSwap', function(evt) {
                if (evt.target.id === 'search-wrapper' || evt.target.id === 'mobile-search-wrapper') {
                    const newInput = document.getElementById('search-input');
                    if (newInput) {
                        newInput.focus();
                        if (newInput.value === '') {
                            newInput.placeholder = 'SEARCH';
                        }
                    }
                }
            });
        }
    });
</script>
