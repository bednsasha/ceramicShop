<div class="bg-cream rounded-xl soft-border p-6">
    <h2 class="font-serif text-xl text-potteryDark mb-4">
        История заказов
    </h2>
    {% if orders %}
        <div class="space-y-4">
            {% for order in orders %}
                <div class="border-b border-pottery/20 pb-4 last:border-0">
                    <p class="text-sm font-medium text-potteryDark">Заказ #{{ order.id }}</p>
                    <p class="text-sm text-stone mt-1">Дата: {{ order.created_at|date:"d F Y" }}</p>
                    <p class="text-sm text-stone">Статус: {{ order.get_status_display }}</p>
                    <p class="text-sm font-medium text-potteryDark mt-1">{{ order.total_price }} ₽</p>
                    <button 
                        hx-get="{% url 'users:order_detail' order.id %}" 
                        hx-target="#profile-main-content" 
                        hx-push-url="true"
                        class="mt-3 btn-outline text-sm py-1.5 px-4"
                    >
                        Подробнее
                    </button>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-stone text-sm">У вас пока нет заказов.</p>
        <a 
            href="{% url 'products:index' %}" 
            hx-get="{% url 'products:index' %}" 
            hx-target="#main-content" 
            hx-push-url="true"
            class="inline-block mt-4 btn-primary text-sm py-2 px-4"
        >
            Начать покупки
        </a>
    {% endif %}
</div>

<style>
    .soft-border {
        border: 1px solid rgba(210, 187, 165, 0.3);
    }
    .btn-primary {
        background-color: #E07A5F;
        color: white;
        border-radius: 9999px;
        transition: all 0.3s ease;
    }
    .btn-primary:hover {
        background-color: #C86A50;
        transform: translateY(-2px);
    }
    .btn-outline {
        border: 1.5px solid #D2BBA5;
        background-color: transparent;
        color: #8B7D6B;
        border-radius: 9999px;
        transition: all 0.3s ease;
        display: inline-block;
        text-align: center;
    }
    .btn-outline:hover {
        background-color: #D2BBA5;
        color: white;
        transform: translateY(-1px);
    }
</style>
